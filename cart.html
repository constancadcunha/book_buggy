<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart — Folio & Co.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">Folio <span>&amp;</span> Co.</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="books.html">Books</a></li>
      <li><a href="index.html#about">About</a></li>
    </ul>
    <a href="cart.html" class="cart-link active" aria-label="View cart">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-label">Cart</span>
      <span class="cart-count" id="cart-count">0</span>
    </a>
  </nav>

  <div class="page-header">
    <h1>Your Cart</h1>
  </div>

  <div class="cart-layout">
    <div id="cart-items" class="cart-items"></div>

    <aside class="cart-summary" id="cart-summary">
      <h2>Order Summary</h2>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotal">£0.00</span>
      </div>
      <div class="summary-row">
        <span>Delivery</span>
        <span id="delivery-cost">£2.99</span>
      </div>
      <div class="summary-row total-row">
        <span>Total</span>
        <span id="total">£0.00</span>
      </div>
      <a href="checkout.html" class="btn btn-primary full-width" id="checkout-btn">Proceed to Checkout</a>
      <a href="books.html" class="btn btn-outline full-width" style="margin-top:0.75rem;">Continue Shopping</a>
    </aside>
  </div>

  <footer class="footer">
    <p>&copy; 2025 Folio &amp; Co. All rights reserved.</p>
  </footer>

  <script src="cart.js"></script>
  <script src="cart-page.js"></script>
</body>
</html>
