<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — Folio & Co.</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Folio <span>&</span> Co.</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="books.html">Books</a>
        <a href="index.html#about">About</a>
      </div>
      <!-- BUG 1: Removed "Cart" label -->
      <a href="cart.html" class="cart-link active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-count" id="cart-count" data-count="0">0</span>
      </a>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Your Cart</h1>
    </div>
  </header>

  <main class="container">
    <div class="cart-layout">
      <div>
        <div id="cart-items"></div>
      </div>
      <aside class="cart-summary">
        <h2>Order Summary</h2>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">£0.00</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span id="delivery">—</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total">£0.00</span>
        </div>
        <a href="checkout.html" id="checkout-btn" class="btn btn-primary full-width">Proceed to Checkout</a>
        <a href="books.html" class="btn btn-outline full-width">Continue Shopping</a>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Folio & Co. All rights reserved.</p>
    </div>
  </footer>

  <script src="cart.js"></script>
  <script src="cart-page.js"></script>
</body>
</html>
