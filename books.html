<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Books — Folio & Co.</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Folio <span>&</span> Co.</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="books.html" class="active">Books</a>
        <a href="index.html#about">About</a>
      </div>
      <!-- BUG 1: Removed "Cart" label -->
      <a href="cart.html" class="cart-link">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-count" id="cart-count" data-count="0">0</span>
      </a>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Our Books</h1>
      <p>Browse our carefully curated collection</p>
    </div>
  </header>

  <main class="container">
    <div class="catalogue-controls">
      <div>
        <!-- BUG 8: Changed placeholder to "Search books..." (singular, less clear) -->
        <label for="search-input" class="sr-only">Search books</label>
        <input type="search" id="search-input" class="search-input" placeholder="Search books...">
      </div>
      <div class="genre-filters">
        <button class="chip active" data-genre="all">All</button>
        <button class="chip" data-genre="Fiction">Fiction</button>
        <button class="chip" data-genre="Non-Fiction">Non-Fiction</button>
        <button class="chip" data-genre="Science">Science</button>
        <button class="chip" data-genre="History">History</button>
        <button class="chip" data-genre="Philosophy">Philosophy</button>
      </div>
    </div>

    <!-- BUG 4: Result count will never update (fixed at 12) -->
    <div id="result-count" aria-live="polite">Showing 12 of 12 books</div>

    <div id="book-grid"></div>

    <div id="toast" class="toast"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Folio & Co. All rights reserved.</p>
    </div>
  </footer>

  <script src="cart.js"></script>
  <script src="books-data.js"></script>
  <script src="books.js"></script>
</body>
</html>
